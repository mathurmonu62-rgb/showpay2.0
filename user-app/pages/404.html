<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | ShowPay</title>
  <link rel="stylesheet" href="../css/common.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#fff; flex-direction:column; gap:16px; text-align:center; padding:24px; }
    .err-code { font-size:80px; font-weight:900; color:#3B8BF5; line-height:1; }
    .err-title { font-size:22px; font-weight:700; color:#1a1a2e; }
    .err-sub { font-size:14px; color:#888; }
    .back-btn { margin-top:8px; padding:12px 28px; background:#3B8BF5; color:#fff; border-radius:24px; font-size:15px; font-weight:600; text-decoration:none; transition:background 0.2s; }
    .back-btn:hover { background:#2b7ae0; }
  </style>
</head>
<body>
  <div class="err-code">404</div>
  <div class="err-title">Page Not Found</div>
  <div class="err-sub">The page you're looking for doesn't exist.</div>
  <a href="/user-app/pages/login.html" class="back-btn">Go to Login</a>
</body>
</html>
