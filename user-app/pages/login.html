<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShowPay — Login</title>
  <meta name="description" content="Login to ShowPay — India's trusted earning platform." />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body class="login-page">

  <!-- Global Loader -->
  <div id="global-loader">
    <div class="spinner"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Header -->
  <div class="login-header">
    <h1 class="login-title">Log In</h1>
    <div class="login-header-line"></div>
  </div>

  <!-- Form -->
  <div class="login-form-area">

    <!-- Phone -->
    <div class="input-group" id="phone-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.06 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
      </svg>
      <input
        type="tel"
        id="mobile-input"
        inputmode="numeric"
        maxlength="15"
        placeholder="Enter Your Phone Number"
        autocomplete="tel"
      />
    </div>

    <!-- Password -->
    <div class="input-group" id="pass-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <input
        type="password"
        id="password-input"
        maxlength="32"
        placeholder="Enter Password"
        autocomplete="current-password"
      />
      <button class="pw-toggle" id="pw-toggle" type="button" aria-label="Toggle password visibility">
        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <!-- Forget Password -->
    <div class="forgot-link">
      <a href="#" id="forgot-btn">Forget Password</a>
    </div>

  </div>

  <!-- Spacer -->
  <div class="login-spacer"></div>

  <!-- Login Button -->
  <div class="login-btn-wrap">
    <button class="login-btn" id="login-btn" type="button">LOG IN</button>
  </div>

  <script type="module" src="../js/auth/login.js"></script>
</body>
</html>
