<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - ShowPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <!-- Top Header -->
        <header class="login-header" style="justify-content: space-between; padding: 0 24px;">
            <div style="width: 26px;"></div> <!-- Spacer for centering -->
            <h1>LOG IN</h1>
            <a href="../../admin-app/pages/login.html" class="header-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0084ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </a>
        </header>

        <!-- Main Form Area -->
        <main class="login-main">
            <form id="user-login-form" class="login-form">
                <!-- Phone Input -->
                <div class="input-group">
                    <span class="input-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a0a0a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </span>
                    <input type="tel" id="mobile-input" placeholder="Enter Your Phone Number" required autocomplete="off" maxlength="10" minlength="10" pattern="\d{10}">
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <span class="input-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a0a0a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="password-input" placeholder="Enter Password" required autocomplete="off" maxlength="12">
                </div>

                <!-- Forget Password Link -->
                <div class="forgot-password-container">
                    <a href="#" class="forgot-password-link" id="forgot-pw-link">Forget Password</a>
                </div>

                <!-- Submit Button -->
                <div class="submit-container">
                    <button type="submit" class="btn-login-submit">LOG IN</button>
                </div>
            </form>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <script type="module" src="../js/auth/login.js"></script>
</body>
</html>
