<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShowPay — Supabase Connection Test</title>
  <style>
    body { font-family: monospace; background: #0f0f0f; color: #00ff88; padding: 2rem; }
    h2 { color: #3B8BF5; }
    .ok { color: #00ff88; }
    .err { color: #ff4444; }
    .row { margin: 6px 0; padding: 8px 12px; background: #1a1a1a; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>🔌 ShowPay 2.0 — Supabase Connection Test</h2>
  <p>Project: <strong>https://ujzupmmvfrhpwziudydr.supabase.co</strong></p>
  <hr />
  <div id="results">Running tests...</div>

  <script type="module">
    import supabase from './user-app/js/config/supabase.js';

    const results = document.getElementById('results');
    const log = (msg, ok = true) => {
      const div = document.createElement('div');
      div.className = 'row ' + (ok ? 'ok' : 'err');
      div.textContent = (ok ? '✅ ' : '❌ ') + msg;
      results.appendChild(div);
    };

    results.innerHTML = '';

    const tables = [
      'admins', 'users', 'slider_images', 'popup_video',
      'telegram_popup', 'settings', 'trash', 'notifications', 'activity_logs'
    ];

    for (const table of tables) {
      const { data, error } = await supabase.from(table).select('*').limit(1);
      if (error) {
        log(`Table [${table}] — ERROR: ${error.message}`, false);
      } else {
        log(`Table [${table}] — Connected ✓ (${data.length} row(s) returned)`);
      }
    }

    log('All table checks complete!');
  </script>
</body>
</html>
