<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - ShowPay Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="../../user-app/css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/users.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="admin-container">
        <nav class="admin-navbar">
            <a href="dashboard.html" class="app-logo">ShowPay Admin</a>
            <div class="admin-nav-links">
                <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
                <a href="users.html" class="admin-nav-link">Users</a>
                <a href="user-details.html" class="admin-nav-link">User Details</a>
                <a href="reports.html" class="admin-nav-link active">Reports</a>
                <a href="slider.html" class="admin-nav-link">Slider</a>
                <a href="banner.html" class="admin-nav-link">Banner</a>
                <a href="video-popup.html" class="admin-nav-link">Video Popup</a>
                <a href="telegram-popup.html" class="admin-nav-link">Telegram Popup</a>
                <a href="settings.html" class="admin-nav-link">Settings</a>
                <a href="profile.html" class="admin-nav-link">Profile</a>
                <button class="btn btn-danger btn-sm" id="admin-logout-btn">Logout</button>
            </div>
        </nav>

        <main class="admin-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Comprehensive Reports</h2>
                <button class="btn btn-primary btn-sm" id="btn-report-download-pdf">📄 Download All Users PDF (Date Wise)</button>
            </div>

            <!-- Summary Cards -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-bottom: 32px;">
                <div class="stat-card" style="background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color);">
                    <div style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Pending Users</div>
                    <div id="report-pending-count" style="font-size: 32px; font-weight: 800; color: #f59e0b; margin-top: 8px;">0</div>
                </div>
                <div class="stat-card" style="background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color);">
                    <div style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Completed Users</div>
                    <div id="report-completed-count" style="font-size: 32px; font-weight: 800; color: #10b981; margin-top: 8px;">0</div>
                </div>
                <div class="stat-card" style="background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color);">
                    <div style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Today's Logins</div>
                    <div id="report-today-count" style="font-size: 32px; font-weight: 800; color: #0084ff; margin-top: 8px;">0</div>
                </div>
            </div>

            <div class="table-container">
                <div class="table-toolbar">
                    <input type="text" id="report-search" placeholder="Search User (Mobile, Password, MPIN, Status)..." class="search-input">
                    <input type="date" id="report-date-filter" class="search-input" title="Filter by Created Date">
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Mobile Number</th>
                            <th>Password</th>
                            <th>MPIN</th>
                            <th>Status</th>
                            <th>Login Count</th>
                            <th>Date</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="reports-table-body">
                        <!-- Populated dynamically via reports.js -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="../js/reports.js"></script>
</body>
</html>
