<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - ShowPay Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="../../user-app/css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/users.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-navbar">
            <a href="dashboard.html" class="app-logo">ShowPay Admin</a>
            <div class="admin-nav-links">
                <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
                <a href="users.html" class="admin-nav-link">Users</a>
                <a href="slider.html" class="admin-nav-link">Sliders</a>
                <a href="video-popup.html" class="admin-nav-link">Videos</a>
                <a href="telegram-popup.html" class="admin-nav-link">Telegram</a>
                <a href="settings.html" class="admin-nav-link active">Settings</a>
                <a href="trash.html" class="admin-nav-link">Trash</a>
                <a href="notifications.html" class="admin-nav-link">Notifications</a>
                <a href="activity-logs.html" class="admin-nav-link">Logs</a>
                <a href="profile.html" class="admin-nav-link">Profile</a>
                <button class="btn btn-danger btn-sm" id="admin-logout-btn">Logout</button>
            </div>
        </nav>

        <main class="admin-main">
            <h2 style="margin-bottom: 24px;">Global Realtime Settings</h2>

            <div class="table-container" style="padding: 32px; max-width: 600px;">
                <form id="admin-settings-form">
                    <div style="margin-bottom: 24px;">
                        <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block;">MPIN Popup Delay (Seconds)</label>
                        <input type="number" id="setting-mpin-delay" class="search-input" style="width: 100%;" value="2" min="0" max="60" required>
                        <span style="font-size: 12px; color: var(--text-muted); margin-top: 6px; display: block;">Time to wait before prompting user to set their MPIN on the Home screen.</span>
                    </div>

                    <div style="margin-bottom: 24px;">
                        <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block;">USDT to INR Ratio</label>
                        <input type="text" id="setting-usdt-ratio" class="search-input" style="width: 100%;" value="107.61" required>
                    </div>

                    <div style="margin-bottom: 24px;">
                        <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block;">Auto Logout Timer (Minutes)</label>
                        <input type="number" id="setting-auto-logout" class="search-input" style="width: 100%;" value="30" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 8px;">Save Changes & Broadcast Realtime</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="../js/settings.js"></script>
</body>
</html>
