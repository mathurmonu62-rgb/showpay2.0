<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - ShowPay Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="../../user-app/css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/users.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-navbar">
            <a href="dashboard.html" class="app-logo">ShowPay Admin</a>
            <div class="admin-nav-links">
                <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
                <a href="users.html" class="admin-nav-link">Users</a>
                <a href="user-details.html" class="admin-nav-link">User Details</a>
                <a href="reports.html" class="admin-nav-link">Reports</a>
                <a href="slider.html" class="admin-nav-link">Slider</a>
                <a href="banner.html" class="admin-nav-link">Banner</a>
                <a href="video-popup.html" class="admin-nav-link">Video Popup</a>
                <a href="telegram-popup.html" class="admin-nav-link">Telegram Popup</a>
                <a href="settings.html" class="admin-nav-link active">Settings</a>
                <a href="profile.html" class="admin-nav-link">Profile</a>
                <button class="btn btn-danger btn-sm" id="admin-logout-btn">Logout</button>
            </div>
        </nav>

        <main class="admin-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Global System Settings (Live Sync)</h2>
            </div>

            <div class="table-container" style="padding: 32px; max-width: 800px; margin: 0 auto;">
                <form id="settings-form" style="display: flex; flex-direction: column; gap: 24px;">
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">MPIN Popup Delay (Seconds)</label>
                        <input type="number" id="setting-mpin-delay" class="search-input" style="width: 100%; margin-top: 8px;" value="2">
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
                        <span style="font-size: 16px; font-weight: 700;">Slider ON/OFF</span>
                        <input type="checkbox" id="setting-slider-enabled" style="width: 24px; height: 24px;" checked>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
                        <span style="font-size: 16px; font-weight: 700;">Banner ON/OFF</span>
                        <input type="checkbox" id="setting-banner-enabled" style="width: 24px; height: 24px;" checked>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
                        <span style="font-size: 16px; font-weight: 700;">Video Popup ON/OFF</span>
                        <input type="checkbox" id="setting-video-enabled" style="width: 24px; height: 24px;" checked>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px;">
                        <span style="font-size: 16px; font-weight: 700;">Telegram Popup ON/OFF</span>
                        <input type="checkbox" id="setting-telegram-enabled" style="width: 24px; height: 24px;" checked>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">💾 Save & Broadcast Live</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="../js/settings.js"></script>
</body>
</html>
