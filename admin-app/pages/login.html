<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShowPay Admin — Login</title>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div id="toast-container"></div>
<div id="global-loader"><div class="spinner"></div></div>

<div class="admin-login-page">
  <div class="login-card">
    <div class="login-card-logo">ShowPay</div>
    <div class="login-card-sub">Admin Panel — Secure Access</div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="admin-email" placeholder="admin@showpay.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="admin-password" placeholder="Enter password" autocomplete="current-password"/>
    </div>

    <button class="login-submit-btn" id="admin-login-btn" type="button">Login to Admin</button>
  </div>
</div>

<script type="module" src="../js/auth.js"></script>
</body>
</html>
