<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ShowPay</title>
    <meta name="description" content="ShowPay Admin Panel Login">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0047b3 0%, #0070f3 50%, #00a3ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative circles */
        body::before {
            content: '';
            position: absolute;
            top: -120px;
            left: -80px;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            border: 50px solid rgba(255,255,255,0.06);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -180px;
            right: -60px;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            border: 70px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        /* Dot pattern top-right */
        .bg-dots {
            position: absolute;
            top: 28px;
            right: 28px;
            width: 120px;
            height: 120px;
            background-image: radial-gradient(rgba(255,255,255,0.22) 2px, transparent 2px);
            background-size: 16px 16px;
            pointer-events: none;
        }

        /* Card */
        .login-card {
            background: #ffffff;
            width: 90%;
            max-width: 380px;
            border-radius: 24px;
            padding: 60px 32px 40px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.22);
            position: relative;
            z-index: 10;
        }

        /* Logo circle */
        .logo-circle {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #0047b3, #0084ff);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white;
            box-shadow: 0 12px 28px rgba(0,71,179,0.3);
        }

        .logo-circle svg {
            width: 48px;
            height: 48px;
            fill: white;
        }

        /* Header */
        .header-block {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-block h1 {
            color: #0047b3;
            font-size: 30px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #374151;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-subtitle::before,
        .header-subtitle::after {
            content: '';
            height: 1px;
            width: 28px;
            background: #0047b3;
            opacity: 0.4;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .input-icon svg {
            width: 18px;
            height: 18px;
            stroke: #0047b3;
            stroke-width: 2.2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .form-input {
            width: 100%;
            height: 52px;
            padding: 0 16px 0 44px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #1f2937;
            background: #fafafa;
        }

        .form-input:focus {
            border-color: #0047b3;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,71,179,0.1);
        }

        .form-input::placeholder {
            color: #b0b8c1;
            font-weight: 400;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #0047b3, #0084ff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
            box-shadow: 0 6px 18px rgba(0,71,179,0.3);
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(0,71,179,0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: #ff4d4f;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #10b981;
        }

        @keyframes slideIn {
            from { transform: translateX(30px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="login-card">
        <!-- ShowPay Logo Circle -->
        <div class="logo-circle">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c-2.49 0-4.5-2.01-4.5-4.5S10.51 7.5 13 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm1-7c-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5-1.12-2.5-2.5-2.5z"/>
            </svg>
        </div>

        <div class="header-block">
            <h1>ShowPay</h1>
            <div class="header-subtitle">Admin Panel</div>
        </div>

        <form id="admin-login-form">
            <div class="form-group">
                <label class="form-label">Admin ID</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </span>
                    <input type="email" id="admin-email" placeholder="Enter your admin id" class="form-input" required value="admin@showpay.com" autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" id="admin-password" placeholder="Enter your password" class="form-input" required value="admin@0123" autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="admin-submit-btn">Login</button>
        </form>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { dbApi } from '../../shared/js/supabase.js';

        function showToast(msg, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast' + (type === 'success' ? ' success' : '');
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value.trim();
            const btn      = document.getElementById('admin-submit-btn');

            btn.innerText = 'Verifying...';
            btn.disabled  = true;

            try {
                const matches = await dbApi.select('admins', { email, password });
                if (matches.length > 0) {
                    sessionStorage.setItem('showpay_admin', JSON.stringify(matches[0]));
                    localStorage.setItem('showpay_admin_session', JSON.stringify(matches[0]));
                    showToast('Login successful!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
                } else {
                    showToast('Invalid credentials. Please try again.');
                    btn.innerText = 'Login';
                    btn.disabled  = false;
                }
            } catch (err) {
                showToast('Connection error: ' + err.message);
                btn.innerText = 'Login';
                btn.disabled  = false;
            }
        });
    </script>
</body>
</html>
