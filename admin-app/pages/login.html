<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ShowPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0052cc 0%, #0084ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        /* Background decorative elements */
        body::before {
            content: '';
            position: absolute;
            top: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 40px solid rgba(255, 255, 255, 0.05);
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -150px;
            right: -50px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 60px solid rgba(255, 255, 255, 0.05);
        }
        .dots {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 15px 15px;
        }
        .login-card {
            background: white;
            width: 90%;
            max-width: 360px;
            border-radius: 20px;
            padding: 50px 30px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 10;
        }
        .logo-circle {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            background: #0052cc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0, 82, 204, 0.2);
        }
        .logo-circle svg {
            width: 45px;
            height: 45px;
            fill: white;
        }
        .header-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .header-title h1 {
            color: #0052cc;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }
        .header-subtitle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #1f2937;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header-subtitle::before, .header-subtitle::after {
            content: '';
            height: 1px;
            width: 30px;
            background: #0052cc;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-icon svg {
            width: 18px;
            height: 18px;
            stroke: #0052cc;
            stroke-width: 2.5;
            fill: none;
        }
        .form-input {
            width: 100%;
            height: 50px;
            padding: 0 16px 0 45px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            border-color: #0052cc;
        }
        .form-input::placeholder {
            color: #9ca3af;
        }
        .btn-login {
            width: 100%;
            height: 50px;
            background: #0052cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #003d99;
        }
    </style>
</head>
<body>
    <div class="dots"></div>
    <div class="login-card">
        <div class="logo-circle">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5zm1-7.5c-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5-1.12-2.5-2.5-2.5z" />
            </svg>
        </div>
        
        <div class="header-title">
            <h1>ShowPay</h1>
            <div class="header-subtitle">ADMIN PANEL</div>
        </div>

        <form id="admin-login-form">
            <div class="form-group">
                <label class="form-label">Admin ID</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </span>
                    <input type="email" id="admin-email" placeholder="Enter your admin id" class="form-input" required value="admin@showpay.com">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" id="admin-password" placeholder="Enter your password" class="form-input" required value="admin@0123">
                </div>
            </div>
            
            <button type="submit" class="btn-login" id="admin-submit-btn">Login</button>
        </form>
    </div>

    <!-- Need toast container for error messages -->
    <div id="toast-container" style="position:fixed;top:20px;right:20px;z-index:9999;"></div>

    <!-- Scripts -->
    <script type="module">
        import { dbApi } from '../../user-app/js/config/supabase.js';
        
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.background = '#ff4d4f';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '8px';
            toast.style.marginBottom = '10px';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const btn = document.getElementById('admin-submit-btn');

            btn.innerText = 'Loading...';
            btn.disabled = true;

            try {
                const matches = await dbApi.select('admins', { email, password });
                if (matches.length > 0) {
                    sessionStorage.setItem('showpay_admin', JSON.stringify(matches[0]));
                    window.location.href = 'dashboard.html';
                } else {
                    showToast('Invalid credentials');
                    btn.innerText = 'Login';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Error connecting to database');
                btn.innerText = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
