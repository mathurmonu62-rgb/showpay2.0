<body>
    <div class="admin-container">
        <nav class="admin-navbar">
            <a href="dashboard.html" class="app-logo">ShowPay Admin</a>
            <div class="admin-nav-links">

                <div style="border-top: 1px solid var(--border-color); padding-top: 20px;">
                    <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Email Address</label>
                    <p style="font-size: 18px; font-weight: 700; margin-top: 4px;">admin@showpay.com</p>
