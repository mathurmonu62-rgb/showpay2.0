<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - ShowPay Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="../../user-app/css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/users.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-navbar">
            <a href="dashboard.html" class="app-logo">ShowPay Admin</a>
            <div class="admin-nav-links">
                <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
                <a href="users.html" class="admin-nav-link">Users</a>
                <a href="user-details.html" class="admin-nav-link active">User Details</a>
                <a href="reports.html" class="admin-nav-link">Reports</a>
                <a href="slider.html" class="admin-nav-link">Slider</a>
                <a href="banner.html" class="admin-nav-link">Banner</a>
                <a href="video-popup.html" class="admin-nav-link">Video Popup</a>
                <a href="telegram-popup.html" class="admin-nav-link">Telegram Popup</a>
                <a href="settings.html" class="admin-nav-link">Settings</a>
                <a href="profile.html" class="admin-nav-link">Profile</a>
                <button class="btn btn-danger btn-sm" id="admin-logout-btn">Logout</button>
            </div>
        </nav>

        <main class="admin-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>User Profile Details</h2>
                <a href="users.html" class="btn btn-secondary btn-sm">⬅️ Back to Users</a>
            </div>

            <div class="table-container" style="padding: 32px; max-width: 800px; margin: 0 auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 24px;">
                    <div>
                        <h3 id="detail-mobile" style="font-size: 28px; font-weight: 800;">+91 ---------</h3>
                        <span id="detail-status" class="status-badge status-completed" style="margin-top: 8px;">COMPLETED</span>
                    </div>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <button class="btn btn-primary btn-sm" id="btn-forward-gmail">📧 One Click Gmail Forward</button>
                        <button class="btn btn-secondary btn-sm" id="btn-download-pdf">📄 Download PDF</button>
                        <button class="btn btn-danger btn-sm" id="btn-move-trash">🗑️ Move to Trash</button>
                        <button class="btn btn-success btn-sm" id="btn-restore-user" style="display: none;">🔄 Restore</button>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Password</label>
                        <p id="detail-password" style="font-size: 18px; font-weight: 700; margin-top: 4px;">---</p>
                    </div>
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Security MPIN</label>
                        <p id="detail-mpin" style="font-size: 18px; font-weight: 700; margin-top: 4px;">---</p>
                    </div>
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Total Login Count</label>
                        <p id="detail-login-count" style="font-size: 18px; font-weight: 700; margin-top: 4px;">0</p>
                    </div>
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Created Date & Time</label>
                        <p id="detail-created" style="font-size: 18px; font-weight: 700; margin-top: 4px;">---</p>
                    </div>
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Last Login Time</label>
                        <p id="detail-last-login" style="font-size: 18px; font-weight: 700; margin-top: 4px;">---</p>
                    </div>
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Device / Browser</label>
                        <p id="detail-device" style="font-size: 18px; font-weight: 700; margin-top: 4px;">---</p>
                    </div>
                    <div>
                        <label style="color: var(--text-muted); font-size: 14px; font-weight: 600;">IP Address (Optional)</label>
                        <p id="detail-ip" style="font-size: 18px; font-weight: 700; margin-top: 4px;">---</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="../js/users.js"></script>
</body>
</html>
