<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Management - ShowPay Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="../../user-app/css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/users.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-navbar">
            <a href="dashboard.html" class="app-logo">ShowPay Admin</a>
            <div class="admin-nav-links">
                <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
                <a href="users.html" class="admin-nav-link">Users</a>
                <a href="user-details.html" class="admin-nav-link">User Details</a>
                <a href="reports.html" class="admin-nav-link">Reports</a>
                <a href="slider.html" class="admin-nav-link active">Slider</a>
                <a href="banner.html" class="admin-nav-link">Banner</a>
                <a href="video-popup.html" class="admin-nav-link">Video Popup</a>
                <a href="telegram-popup.html" class="admin-nav-link">Telegram Popup</a>
                <a href="settings.html" class="admin-nav-link">Settings</a>
                <a href="profile.html" class="admin-nav-link">Profile</a>
                <button class="btn btn-danger btn-sm" id="admin-logout-btn">Logout</button>
            </div>
        </nav>

        <main class="admin-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Live Slider Content Manager</h2>
                <div>
                    <input type="file" id="slider-file-input" accept="image/*" style="display: none;">
                    <button class="btn btn-primary btn-sm" id="btn-add-slider">➕ Upload from Gallery</button>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Preview</th>
                            <th>Title</th>
                            <th>Display Order</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sliders-table-body">
                        <!-- Populated dynamically via slider.js -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="../js/slider.js"></script>
</body>
</html>
